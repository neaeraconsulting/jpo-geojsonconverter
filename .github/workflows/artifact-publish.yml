name: Publish Java Package

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    - name: Build with Maven
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        cd jpo-geojsonconverter
        mvn -B package --file pom.xml -DskipTests -Ppackage-jar

    - name: Publish to GitHub Packages
      run: |
        cd jpo-geojsonconverter
        mvn --batch-mode -Dgithub_organization=${{ github.repository_owner }} deploy -DskipTests -Ppackage-jar
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
