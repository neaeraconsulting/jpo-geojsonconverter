server.port: 8188

#General Properties
groupId: '@project.groupId@'
artifactId: '@project.artifactId@'
version: '@project.version@'

# Don't run the Spring Boot web server
spring.main.web-application-type: servlet

# Unused feature
spring.groovy.template.check-template-location: false

# JSON Schema resource paths
schema:
  bsm: classpath:schemas/bsm.schema.json
  map: classpath:schemas/map.schema.json
  spat: classpath:schemas/spat.schema.json
  psm: classpath:schemas/psm.schema.json
  rtcm: classpath:schemas/rtcm.schema.json

# Geometry JSON output mode (GEOJSON_ONLY or WKT)
geometry.output.mode: GEOJSON_ONLY

# Kafka properties
spring.kafka.bootstrap-servers: localhost:9092

# Custom kafka properties
kafka.topics:
  autoCreateTopics: true
  numPartitions: 1
  numReplicas: 1
  createTopics:
    - name: topic.ProcessedSpat
      cleanupPolicy: delete
      retentionMs: 300000
    - name: topic.ProcessedMap
      cleanupPolicy: delete
      retentionMs: 300000
    - name: topic.ProcessedMapWKT
      cleanupPolicy: delete
      retentionMs: 300000
    - name: topic.ProcessedPsm
      cleanupPolicy: delete
      retentionMs: 300000

# Jackson Properties
spring.jackson.serialization.write-dates-as-timestamps: false

kafka.linger_ms: 50

# Whether to fully decode RTCM payloads
# true = fully decode using the native gpsdecode tool
# false = partial decode: message type and station id only
rtcm.full.decode: true